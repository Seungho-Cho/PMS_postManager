<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${label} + ' · PostManager'">PostManager</title>
    <th:block th:replace="~{fragments/layout :: themeInit}"></th:block>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="sticky-top">
    <header th:replace="~{fragments/layout :: header(${username}, ${currentDiscordIcon}, ${currentDiscordId})}"></header>
</div>

<main class="admin-content">
    <div class="menu-html-content" th:utext="${htmlContent}"></div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/nav-dropdown.js}"></script>
</body>
</html>
