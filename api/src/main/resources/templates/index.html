<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modelog</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div th:if="${param.loginError}" class="login-error-banner">
    해당 Discord 서버 멤버만 로그인할 수 있습니다.
</div>
<header class="navbar">
    <span class="logo">Modelog</span>
    <div class="auth-area">
        <div th:if="${username}" class="user-info">
            <img th:if="${avatar}" th:src="'https://cdn.discordapp.com/avatars/' + ${discordId} + '/' + ${avatar} + '.png'" class="avatar" alt="avatar">
            <span th:text="${username}">사용자</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">로그아웃</button>
            </form>
        </div>
        <a th:unless="${username}" th:href="@{/oauth2/authorization/discord}" class="login-btn">
            Discord로 로그인
        </a>
    </div>
</header>

<main class="hero">
    <h1>스케일 모델 동호회 사진을 SNS로</h1>
    <p>Discord에 올린 사진을 자동 수집하고, Instagram &amp; X에 한 번에 포스팅하세요.</p>
</main>
</body>
</html>
