<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PostManager</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div th:if="${param.loginError}" class="login-error-banner">
    해당 Discord 서버 멤버만 로그인할 수 있습니다.
</div>
<header th:replace="~{fragments/layout :: header(${username}, ${avatar}, ${discordId})}"></header>

<main class="hero">
    <div class="hero-inner">
        <h1>Discord 사진을 SNS로</h1>
        <p>Discord에 올린 사진을 자동 수집하고, Instagram &amp; X에 한 번에 포스팅하세요.</p>
        <a th:unless="${username}" th:href="@{/oauth2/authorization/discord}" class="login-btn">
            Discord로 시작하기
        </a>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
