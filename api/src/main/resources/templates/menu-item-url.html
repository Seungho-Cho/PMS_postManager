<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${label} + ' · PostManager'">PostManager</title>
    <th:block th:replace="~{fragments/layout :: themeInit}"></th:block>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="sticky-top">
    <header th:replace="~{fragments/layout :: header(${username}, ${currentDiscordIcon}, ${currentDiscordId})}"></header>
</div>

<main class="auth-gate">
    <div class="auth-gate-card">
        <div class="auth-gate-icon">🔗</div>
        <h1 th:text="${label}">바로가기</h1>
        <p>외부 페이지로 연결됩니다.<br>아래 버튼을 누르면 새 탭에서 열립니다.</p>
        <a th:href="${targetUrl}" target="_blank" rel="noopener" class="login-btn auth-gate-btn">연결하기</a>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/nav-dropdown.js}"></script>
</body>
</html>
