<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header(username, currentDiscordIcon, currentDiscordId)" class="navbar">
    <div class="navbar-inner">
        <div class="navbar-left">
            <a href="/" class="logo">PostManager</a>
            <nav class="nav-menu">
                <a th:if="${username}" href="/posts" class="nav-link">포스트 관리</a>
                <a th:if="${username}" href="/admin/configs" class="nav-link">설정 관리</a>
                <a href="https://linktr.ee/team_plamason" class="nav-link" target="_blank" rel="noopener">Linktree</a>
            </nav>
        </div>
        <div class="auth-area">
            <button type="button" id="themeToggleBtn" class="theme-toggle" aria-label="라이트/다크 모드 전환">
                <span class="theme-toggle-track">
                    <span class="theme-toggle-icon theme-toggle-icon-sun">☀️</span>
                    <span class="theme-toggle-icon theme-toggle-icon-moon">🌙</span>
                </span>
                <span class="theme-toggle-thumb"></span>
            </button>
            <div th:if="${username}" class="user-info">
                <img th:if="${currentDiscordIcon}" th:src="'https://cdn.discordapp.com/avatars/' + ${currentDiscordId} + '/' + ${currentDiscordIcon} + '.png'" class="avatar" alt="avatar">
                <span th:text="${username}">사용자</span>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="logout-btn">로그아웃</button>
                </form>
            </div>
            <a th:unless="${username}" th:href="@{/oauth2/authorization/discord}" class="login-btn">
                Discord로 로그인
            </a>
        </div>
    </div>
</header>

<script th:fragment="themeInit">
(function () {
    var stored = localStorage.getItem('theme');
    var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<footer th:fragment="footer" class="site-footer">
    <span>&copy; 2026 PostManager</span>
    <span class="footer-sep">·</span>
    <b>Seungho Cho</b>, Plamason. All rights reserved.
</footer>
</body>
</html>
