<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>포스트 관리 · PostManager</title>
    <th:block th:replace="~{fragments/layout :: themeInit}"></th:block>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header(${username}, ${currentDiscordIcon}, ${currentDiscordId})}"></header>

<main class="admin-content">
    <div class="admin-header">
        <h1>포스트 관리</h1>
    </div>

    <div id="errorBanner" class="login-error-banner" style="display:none;"></div>

    <div class="post-list" id="postGrid"></div>
</main>

<div class="preview-modal-backdrop" id="failureLogModal" hidden>
    <div class="preview-modal">
        <div class="preview-modal-header">
            <strong>⚠ 포스팅 실패 로그</strong>
            <button type="button" class="preview-modal-close" id="failureLogCloseBtn" aria-label="닫기">✕</button>
        </div>
        <div class="preview-modal-body">
            <p class="post-form-hint" style="padding: 20px;">에러 로그 기능은 추후 제공될 예정입니다.</p>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/csrf.js}"></script>
<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/admin-posts.js}"></script>
</body>
</html>
