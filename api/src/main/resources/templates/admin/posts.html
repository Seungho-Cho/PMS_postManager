<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>포스트 관리 · PostManager</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header(${username}, ${avatar}, ${discordId})}"></header>

<main class="admin-content">
    <div class="admin-header">
        <h1>포스트 관리</h1>
        <button type="button" id="addPostBtn" class="login-btn">+ 테스트 포스트 생성</button>
    </div>

    <div id="errorBanner" class="login-error-banner" style="display:none;"></div>

    <div class="settings-panel post-form-panel" id="newPostPanel" style="display:none;">
        <div class="post-form-grid">
            <label class="post-form-label">Discord Message ID
                <input id="newDiscordMessageId" type="text">
            </label>
            <label class="post-form-label">작성자 Discord ID
                <input id="newAuthorDiscordId" type="text">
            </label>
            <label class="post-form-label">작성자 아이콘 URL
                <input id="newAuthorDiscordIcon" type="text">
            </label>
            <label class="post-form-label">작성자 닉네임
                <input id="newAuthorDiscordNickname" type="text">
            </label>
            <label class="post-form-label">제목
                <input id="newTitle" type="text">
            </label>
        </div>
        <label class="post-form-label">사진 URL (쉼표로 구분, 비워도 됨)
            <input id="newPhotoUrls" type="text" placeholder="https://.../1.png, https://.../2.png">
        </label>
        <label class="post-form-label">캡션
            <textarea id="newCaption" rows="3"></textarea>
        </label>
        <div class="settings-row-actions">
            <button type="button" id="confirmAddPostBtn" class="save-btn">생성</button>
            <button type="button" id="cancelAddPostBtn" class="logout-btn">취소</button>
        </div>
    </div>

    <div class="post-grid" id="postGrid" th:attr="data-current-discord-id=${discordId}"></div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/csrf.js}"></script>
<script th:src="@{/js/admin-posts.js}"></script>
</body>
</html>
