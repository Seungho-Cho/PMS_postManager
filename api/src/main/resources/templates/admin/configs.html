<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>설정 관리 · PostManager</title>
    <th:block th:replace="~{fragments/layout :: themeInit}"></th:block>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header(${username}, ${currentDiscordIcon}, ${currentDiscordId})}"></header>

<main class="admin-content">
    <div class="admin-header">
        <h1>설정 관리</h1>
        <button type="button" id="addConfigBtn" class="login-btn">+ 새 설정</button>
    </div>

    <div id="errorBanner" class="login-error-banner" style="display:none;"></div>

    <section class="admin-section">
        <h2 class="admin-section-title">Discord 봇</h2>
        <div class="settings-panel">
            <div class="settings-row discord-bot-row">
                <div class="settings-row-label">
                    <span class="settings-key">연결 제어</span>
                    <span class="settings-meta">discord.bot.token
discord.watch-channel-id
설정이 필요합니다.</span>
                </div>
                <div class="settings-row-actions">
                    <button type="button" id="botStartBtn" class="save-btn">시작</button>
                    <button type="button" id="botRestartBtn" class="ghost-btn">재시작</button>
                    <button type="button" id="botStopBtn" class="danger-btn">종료</button>
                </div>
            </div>
        </div>
    </section>

    <section class="admin-section">
        <h2 class="admin-section-title">Instagram</h2>
        <div class="settings-panel">
            <div class="settings-row instagram-status-row">
                <div class="settings-row-label">
                    <span class="settings-key"><span id="instagramStatusDot" class="status-dot status-dot-gray"></span> Access Token 상태</span>
                    <span class="settings-meta" id="instagramStatusMeta">확인 중...</span>
                </div>
                <div class="settings-row-actions">
                    <button type="button" id="instagramRecheckBtn" class="ghost-btn">다시 확인</button>
                    <button type="button" id="instagramRefreshBtn" class="save-btn">수동 갱신</button>
                </div>
            </div>
        </div>
    </section>

    <section class="admin-section">
        <h2 class="admin-section-title">키-값 설정</h2>
        <div class="settings-panel">
            <div class="settings-row settings-row-new" id="newConfigRow" style="display:none;">
                <input id="newKeyInput" type="text" placeholder="key" class="key-input">
                <textarea id="newValueInput" placeholder="value" class="value-input" rows="1"></textarea>
                <div class="settings-row-actions">
                    <button type="button" id="confirmAddBtn" class="save-btn">추가</button>
                    <button type="button" id="cancelAddBtn" class="logout-btn">취소</button>
                </div>
            </div>
            <div id="configList"></div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/csrf.js}"></script>
<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/admin-configs.js}"></script>
</body>
</html>
