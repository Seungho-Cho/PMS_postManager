<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>설정 관리</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<header class="navbar">
    <a href="/" class="logo" style="color:inherit;text-decoration:none;">PostManager</a>
</header>

<main class="admin-content">
    <div class="admin-header">
        <h1>외부 연동 설정</h1>
    </div>

    <div id="errorBanner" class="login-error-banner" style="display:none;"></div>

    <table class="config-table">
        <thead>
        <tr>
            <th>Key</th>
            <th>Value</th>
            <th>수정 시각</th>
            <th></th>
        </tr>
        </thead>
        <tbody id="configTableBody"></tbody>
    </table>

    <h2 id="formTitle">새 설정 추가</h2>
    <form id="configForm" class="config-form">
        <label for="keyInput">Key</label>
        <input id="keyInput" name="key" type="text" required>

        <label for="valueInput">Value</label>
        <input id="valueInput" name="value" type="text" required>

        <div class="config-actions">
            <button type="submit" class="login-btn">저장</button>
            <button type="button" id="cancelEditBtn" class="logout-btn" style="display:none;">취소</button>
        </div>
    </form>
</main>

<script src="/js/admin-configs.js"></script>
</body>
</html>
